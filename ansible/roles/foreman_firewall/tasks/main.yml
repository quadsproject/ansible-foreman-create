---
- name: Check if firewalld is active
  ansible.builtin.command: systemctl is-active firewalld
  register: firewalld_status
  changed_when: false
  failed_when: false

- name: Check if iptables service is active
  ansible.builtin.command: systemctl is-active iptables
  register: iptables_status
  changed_when: false
  failed_when: false

- name: Configure ports via firewalld
  ansible.builtin.shell: |
    set -e
    changed=0
    for port in {{ foreman_tcp_ports | join(' ') }}; do
      if ! firewall-cmd --permanent --query-port="${port}/tcp" &>/dev/null; then
        firewall-cmd --permanent --add-port="${port}/tcp"
        changed=1
      fi
    done
    for port in {{ foreman_udp_ports | join(' ') }}; do
      if ! firewall-cmd --permanent --query-port="${port}/udp" &>/dev/null; then
        firewall-cmd --permanent --add-port="${port}/udp"
        changed=1
      fi
    done
    if [ "$changed" = "1" ]; then
      firewall-cmd --reload
      echo "changed"
    else
      echo "unchanged"
    fi
  register: firewalld_result
  changed_when: "'changed' in firewalld_result.stdout"
  when: firewalld_status.rc == 0

- name: Configure ports via iptables
  ansible.builtin.shell: |
    set -e
    TCP_PORTS="{{ foreman_tcp_ports | join(' ') }}"
    UDP_PORTS="{{ foreman_udp_ports | join(' ') }}"

    # Emit the complete desired INPUT ruleset in iptables-save (-S) format.
    expected_rules() {
      echo "-A INPUT -m state --state RELATED,ESTABLISHED -j ACCEPT"
      echo "-A INPUT -p icmp -j ACCEPT"
      echo "-A INPUT -i lo -j ACCEPT"
      echo "-A INPUT -p tcp -m state --state NEW -m tcp --dport 22 -j ACCEPT"
      for port in $TCP_PORTS; do
        echo "-A INPUT -p tcp -m state --state NEW -m tcp --dport ${port} -j ACCEPT"
      done
      for port in $UDP_PORTS; do
        echo "-A INPUT -p udp -m udp --dport ${port} -j ACCEPT"
      done
      echo "-A INPUT -j REJECT --reject-with icmp-host-prohibited"
    }

    current=$(iptables -S INPUT | grep -v '^-P ')

    if [ "$(expected_rules)" = "$current" ]; then
      echo "unchanged"
      exit 0
    fi

    iptables -F INPUT
    while IFS= read -r rule; do
      iptables $rule
    done < <(expected_rules)

    service iptables save
    echo "changed"
  register: iptables_result
  changed_when: "'changed' in iptables_result.stdout"
  when: firewalld_status.rc != 0 and iptables_status.rc == 0

- name: Warn if no supported firewall is active
  ansible.builtin.debug:
    msg: "WARNING: neither firewalld nor iptables service is active. Firewall ports were not configured."
  when: firewalld_status.rc != 0 and iptables_status.rc != 0

- name: Add SNAT rule for TFTP TID packets on managed interface
  ansible.builtin.shell: |
    RULE="-o {{ dhcp_interface }} -m conntrack --ctstate RELATED -p udp -j SNAT --to-source {{ dhcp_interface_ip }}"
    if iptables -t nat -C POSTROUTING $RULE 2>/dev/null; then
      echo "unchanged"
    else
      iptables -t nat -A POSTROUTING $RULE
      service iptables save
      echo "changed"
    fi
  register: _tftp_snat
  changed_when: "'changed' in _tftp_snat.stdout"
  when: firewalld_status.rc != 0 and iptables_status.rc == 0
